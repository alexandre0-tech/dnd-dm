<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Quête — Donjon & Dragons</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
:root {
  --bg: #080604;
  --surface: #12100d;
  --surface2: #1c1915;
  --border: rgba(180,140,60,0.2);
  --gold: #c9a84c;
  --gold-light: #e8c96a;
  --text: #e8dcc8;
  --text-muted: #8a7a62;
  --text-dim: #4a3e2e;
  --red: #8b2020;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Crimson Text', Georgia, serif;
  font-size: 17px;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── SCENE LAYER ── */
#scene {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* Hero image */
.scene-hero {
  position: relative;
  height: 52vh;
  min-height: 280px;
  overflow: hidden;
  background: #0d0b08;
}
.scene-hero img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  opacity: 0;
  transition: opacity 1.2s ease;
}
.scene-hero img.loaded { opacity: .75; }
.scene-hero-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom, rgba(8,6,4,0) 30%, rgba(8,6,4,1) 100%);
}
.scene-hero-placeholder {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 5rem;
  opacity: .15;
}

/* Scene body */
.scene-body {
  flex: 1;
  max-width: 820px;
  margin: 0 auto;
  padding: 0 1.25rem 2rem;
  width: 100%;
}

.scene-label {
  font-family: 'Cinzel', serif;
  font-size: .62rem;
  letter-spacing: .16em;
  color: var(--gold);
  text-transform: uppercase;
  margin-bottom: .5rem;
  opacity: .8;
}
.scene-title {
  font-family: 'Cinzel', serif;
  font-size: 2rem;
  font-weight: 700;
  color: var(--gold-light);
  line-height: 1.2;
  margin-bottom: .6rem;
}
.scene-type {
  font-size: .9rem;
  color: var(--text-muted);
  font-style: italic;
  margin-bottom: 1.25rem;
}
.scene-desc {
  font-size: 1.05rem;
  line-height: 1.8;
  color: var(--text);
  margin-bottom: 1.5rem;
  border-left: 2px solid rgba(201,168,76,0.25);
  padding-left: 1rem;
}
.ambiance-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 8px;
  margin-bottom: 1.5rem;
}
.ambiance-tag {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: .45rem .75rem;
  font-size: .88rem;
  color: var(--text-muted);
}
.sensory-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 1rem 1.25rem;
  margin-bottom: 1.5rem;
}
.sensory-title {
  font-family: 'Cinzel', serif;
  font-size: .6rem;
  letter-spacing: .12em;
  color: var(--text-dim);
  text-transform: uppercase;
  margin-bottom: .75rem;
}
.sensory-text {
  font-size: .93rem;
  color: var(--text-muted);
  line-height: 1.8;
  white-space: pre-line;
}

/* Monsters in scene */
.monsters-section { margin-bottom: 1.5rem; }
.section-title {
  font-family: 'Cinzel', serif;
  font-size: .6rem;
  letter-spacing: .14em;
  color: var(--text-dim);
  text-transform: uppercase;
  margin-bottom: .75rem;
}
.monster-row {
  display: flex;
  gap: 12px;
  align-items: flex-start;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: .9rem 1rem;
  margin-bottom: .6rem;
  background: var(--surface);
}
.monster-img-wrap {
  width: 72px;
  height: 72px;
  border-radius: 4px;
  overflow: hidden;
  flex-shrink: 0;
  background: var(--surface2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2rem;
}
.monster-img-wrap img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.monster-info { flex: 1; }
.monster-name { font-family: 'Cinzel', serif; font-size: .95rem; font-weight: 600; color: var(--gold-light); margin-bottom: .2rem; }
.monster-cr { font-size: .8rem; color: var(--text-muted); margin-bottom: .35rem; }
.monster-desc { font-size: .9rem; color: var(--text-muted); line-height: 1.6; font-style: italic; }

/* Combat grid */
.combat-section { margin-bottom: 2rem; }
.grid-controls { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: .75rem; align-items: center; }
.token-btn {
  display: flex; align-items: center; gap: 5px;
  padding: .35rem .8rem;
  font-family: 'Cinzel', serif;
  font-size: .6rem;
  letter-spacing: .06em;
  border: 1px solid var(--border);
  border-radius: 4px;
  cursor: pointer;
  background: transparent;
  color: var(--text-muted);
  transition: all .2s;
}
.token-btn:hover { color: var(--gold); border-color: rgba(201,168,76,0.4); }
.token-btn.selected { background: rgba(201,168,76,0.1); border-color: var(--gold); color: var(--gold); }
.token-dot { width: 16px; height: 16px; border-radius: 50%; flex-shrink: 0; }
.grid-canvas-wrap {
  border: 1px solid var(--border);
  border-radius: 6px;
  overflow: hidden;
  background: #0a0806;
}
canvas { display: block; cursor: crosshair; }
.grid-hint { font-size: .8rem; color: var(--text-dim); margin-top: .5rem; }
.bg-select {
  padding: .35rem .7rem;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text-muted);
  font-family: 'Cinzel', serif;
  font-size: .6rem;
  letter-spacing: .06em;
  cursor: pointer;
}
.bg-select:focus { outline: none; border-color: var(--gold); }
.clear-btn {
  padding: .35rem .8rem;
  font-family: 'Cinzel', serif;
  font-size: .6rem;
  letter-spacing: .06em;
  border: 1px solid rgba(180,60,60,0.35);
  border-radius: 4px;
  cursor: pointer;
  background: transparent;
  color: #b06060;
  transition: all .2s;
  margin-left: auto;
}
.clear-btn:hover { background: rgba(180,60,60,0.1); }
.legend { display: flex; gap: 12px; flex-wrap: wrap; margin-top: .6rem; }
.legend-item { display: flex; align-items: center; gap: 5px; font-size: .82rem; color: var(--text-muted); }

/* Navigation */
nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: rgba(8,6,4,0.92);
  backdrop-filter: blur(12px);
  border-top: 1px solid var(--border);
  padding: .75rem 1.5rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  z-index: 200;
}
.nav-btn {
  padding: .5rem 1.4rem;
  font-family: 'Cinzel', serif;
  font-size: .65rem;
  letter-spacing: .1em;
  border: 1px solid var(--border);
  border-radius: 4px;
  cursor: pointer;
  background: transparent;
  color: var(--text-muted);
  transition: all .2s;
}
.nav-btn:hover:not(:disabled) { color: var(--gold); border-color: rgba(201,168,76,0.5); }
.nav-btn:disabled { opacity: .25; cursor: default; }
.nav-center { text-align: center; }
.nav-scene-num { font-family: 'Cinzel', serif; font-size: .65rem; color: var(--text-dim); }
.nav-scene-name { font-family: 'Cinzel', serif; font-size: .8rem; color: var(--gold); margin-top: .1rem; }

#scene { padding-bottom: 80px; }

@media(max-width:500px){
  .scene-title{font-size:1.4rem;}
  .ambiance-grid{grid-template-columns:1fr 1fr;}
}
</style>
</head>
<body>

<div id="scene">
  <div class="scene-hero" id="hero">
    <img id="heroImg" src="" alt="">
    <div class="scene-hero-overlay"></div>
    <div class="scene-hero-placeholder" id="heroEmoji"></div>
  </div>
  <div class="scene-body">
    <div class="scene-label" id="sceneLabel"></div>
    <div class="scene-title" id="sceneTitle"></div>
    <div class="scene-type" id="sceneType"></div>
    <div class="scene-desc" id="sceneDesc"></div>
    <div class="ambiance-grid" id="ambianceTags"></div>
    <div class="sensory-box">
      <div class="sensory-title">Détails sensoriels</div>
      <div class="sensory-text" id="sensoryText"></div>
    </div>
    <div class="monsters-section" id="monstersSection">
      <div class="section-title">Ennemis présents</div>
      <div id="monstersList"></div>
    </div>
    <div class="combat-section">
      <div class="section-title">Carte de combat</div>
      <div class="grid-controls">
        <div id="tokenBar"></div>
        <select class="bg-select" id="bgSel" onchange="changeBg()">
          <option value="dungeon">Donjon</option>
          <option value="forest">Forêt</option>
          <option value="taverne">Taverne</option>
          <option value="cave">Grotte</option>
          <option value="plaine">Plaine</option>
        </select>
        <button class="clear-btn" onclick="clearTokens()">Vider</button>
      </div>
      <div class="grid-canvas-wrap">
        <canvas id="grid"></canvas>
      </div>
      <div class="grid-hint">Clique sur une case pour placer le jeton sélectionné · Clic droit pour supprimer</div>
      <div class="legend" id="legend"></div>
    </div>
  </div>
</div>

<nav>
  <button class="nav-btn" id="prevBtn" onclick="navigate(-1)">← Précédent</button>
  <div class="nav-center">
    <div class="nav-scene-num" id="navNum"></div>
    <div class="nav-scene-name" id="navName"></div>
  </div>
  <button class="nav-btn" id="nextBtn" onclick="navigate(1)">Suivant →</button>
</nav>

<script src="data/session.js"></script>
<script>
/* ── TOKEN DEFINITIONS ── */
const tokens = [
  {id:"f",label:"Guerrier",color:"#2271b3",emoji:"⚔"},
  {id:"w",label:"Mage",color:"#6a3ab7",emoji:"✦"},
  {id:"r",label:"Roublard",color:"#2a7a43",emoji:"◆"},
  {id:"c",label:"Clerc",color:"#8a6020",emoji:"✧"},
  {id:"e1",label:"Ennemi",color:"#8b2020",emoji:"✕"},
  {id:"e2",label:"Boss",color:"#5a0000",emoji:"☠",size:2}
];

let selectedToken = tokens[0];
let placed = [];
let showGrid = true;
let currentBg = "dungeon";
const CELL = 40;
let COLS, ROWS;

/* ── SCENE NAVIGATION ── */
let sceneIndex = 0;

function showScene(idx){
  sceneIndex = idx;
  const s = SESSION.scenes[idx];
  document.getElementById("sceneLabel").textContent = `Scène ${idx+1} sur ${SESSION.scenes.length}`;
  document.getElementById("sceneTitle").textContent = s.name;
  document.getElementById("sceneType").textContent = s.type;
  document.getElementById("sceneDesc").textContent = s.description;
  document.getElementById("ambianceTags").innerHTML = s.ambiance.map(a=>`<div class="ambiance-tag">${a}</div>`).join("");
  document.getElementById("sensoryText").textContent = s.sensory;
  const heroImg = document.getElementById("heroImg");
  const heroEmoji = document.getElementById("heroEmoji");
  if(s.image){
    heroImg.classList.remove("loaded");
    heroImg.src = s.image;
    heroImg.onload = ()=>heroImg.classList.add("loaded");
    heroEmoji.textContent = "";
  } else {
    heroImg.src=""; heroEmoji.textContent = s.emoji||"🗺";
  }
  const ml = document.getElementById("monstersList");
  const ms = document.getElementById("monstersSection");
  if(s.monsters && s.monsters.length){
    ms.style.display="block";
    ml.innerHTML = s.monsters.map(m=>`
    <div class="monster-row">
      <div class="monster-img-wrap">
        ${m.image?`<img src="${m.image}" alt="${m.name}">`:`<span>${m.emoji||"👾"}</span>`}
      </div>
      <div class="monster-info">
        <div class="monster-name">${m.name}</div>
        <div class="monster-cr">CR ${m.cr} · ${m.count>1?m.count+"×":""} ${m.type}</div>
        <div class="monster-desc">${m.appearance}</div>
      </div>
    </div>`).join("");
  } else { ms.style.display="none"; }
  document.getElementById("navNum").textContent = `${idx+1} / ${SESSION.scenes.length}`;
  document.getElementById("navName").textContent = s.name;
  document.getElementById("prevBtn").disabled = idx===0;
  document.getElementById("nextBtn").disabled = idx===SESSION.scenes.length-1;
  placed = [];
  drawGrid();
  window.scrollTo({top:0,behavior:"smooth"});
}

function navigate(dir){
  const next = sceneIndex + dir;
  if(next>=0 && next<SESSION.scenes.length) showScene(next);
}

/* ── COMBAT GRID ── */
function initCanvas(){
  const canvas = document.getElementById("grid");
  const wrap = canvas.parentElement;
  const w = wrap.clientWidth || 640;
  COLS = Math.floor(w/CELL);
  ROWS = Math.floor(Math.min(420, window.innerHeight*0.45)/CELL);
  canvas.width = COLS*CELL;
  canvas.height = ROWS*CELL;
}

function getBg(bg){
  const m={
    dungeon:{a:"#1a1714",b:"#141210",grid:"rgba(120,100,60,0.2)"},
    forest:{a:"#0d1a0a",b:"#0a1408",grid:"rgba(60,130,50,0.25)"},
    taverne:{a:"#1a1008",b:"#140c06",grid:"rgba(180,120,50,0.2)"},
    cave:{a:"#0a0e1a",b:"#080b14",grid:"rgba(60,80,160,0.2)"},
    plaine:{a:"#0a1a08",b:"#081408",grid:"rgba(80,160,50,0.2)"}
  };
  return m[bg]||m.dungeon;
}

function drawGrid(){
  const canvas = document.getElementById("grid");
  if(!canvas||!COLS) return;
  const ctx = canvas.getContext("2d");
  const bg = getBg(currentBg);
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    ctx.fillStyle = (r+c)%2===0?bg.a:bg.b;
    ctx.fillRect(c*CELL,r*CELL,CELL,CELL);
  }
  if(showGrid){
    ctx.strokeStyle=bg.grid; ctx.lineWidth=0.5;
    for(let c=0;c<=COLS;c++){ctx.beginPath();ctx.moveTo(c*CELL,0);ctx.lineTo(c*CELL,ROWS*CELL);ctx.stroke();}
    for(let r=0;r<=ROWS;r++){ctx.beginPath();ctx.moveTo(0,r*CELL);ctx.lineTo(COLS*CELL,r*CELL);ctx.stroke();}
  }
  placed.forEach(p=>{
    const def=tokens.find(t=>t.id===p.type);
    const s=def.size||1;
    const cx=p.col*CELL+s*CELL/2, cy=p.row*CELL+s*CELL/2;
    const r=s*CELL/2-4;
    ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
    ctx.fillStyle=def.color; ctx.fill();
    ctx.strokeStyle="rgba(255,255,255,0.35)"; ctx.lineWidth=1.5; ctx.stroke();
    ctx.fillStyle="#fff"; ctx.font=`bold ${s>1?18:13}px serif`;
    ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.fillText(def.emoji,cx,cy);
  });
  renderLegend();
}

function renderLegend(){
  const used=[...new Set(placed.map(p=>p.type))];
  document.getElementById("legend").innerHTML = used.map(id=>{
    const d=tokens.find(t=>t.id===id);
    return`<div class="legend-item"><div class="token-dot" style="background:${d.color}"></div><span>${d.label}</span></div>`;
  }).join("");
}

function renderTokenBar(){
  document.getElementById("tokenBar").innerHTML = tokens.map(t=>`
  <button class="token-btn${selectedToken.id===t.id?" selected":""}" onclick="selectTok('${t.id}')" style="${selectedToken.id===t.id?"border-color:"+t.color:""}">
    <div class="token-dot" style="background:${t.color}"></div>${t.label}
  </button>`).join("");
}

function selectTok(id){ selectedToken=tokens.find(t=>t.id===id); renderTokenBar(); }
function changeBg(){ currentBg=document.getElementById("bgSel").value; drawGrid(); }
function clearTokens(){ placed=[]; drawGrid(); }

document.addEventListener("DOMContentLoaded",()=>{
  initCanvas();
  renderTokenBar();
  const canvas=document.getElementById("grid");
  canvas.addEventListener("click",e=>{
    const rect=canvas.getBoundingClientRect();
    const sx=canvas.width/rect.width, sy=canvas.height/rect.height;
    const col=Math.floor((e.clientX-rect.left)*sx/CELL);
    const row=Math.floor((e.clientY-rect.top)*sy/CELL);
    if(col<0||col>=COLS||row<0||row>=ROWS) return;
    const idx=placed.findIndex(p=>p.col===col&&p.row===row&&p.type===selectedToken.id);
    if(idx>=0) placed.splice(idx,1); else placed.push({col,row,type:selectedToken.id});
    drawGrid();
  });
  canvas.addEventListener("contextmenu",e=>{
    e.preventDefault();
    const rect=canvas.getBoundingClientRect();
    const sx=canvas.width/rect.width, sy=canvas.height/rect.height;
    const col=Math.floor((e.clientX-rect.left)*sx/CELL);
    const row=Math.floor((e.clientY-rect.top)*sy/CELL);
    placed=placed.filter(p=>!(p.col===col&&p.row===row));
    drawGrid();
  });
  showScene(0);
});
</script>
</body>
</html>
