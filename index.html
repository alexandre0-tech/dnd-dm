<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DM Tracker — Les Ruines Oubliées</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{--bg:#0e0c0a;--surface:#1a1612;--surface2:#231f1a;--border:rgba(180,140,60,0.25);--gold:#c9a84c;--gold-light:#e8c96a;--red:#c0392b;--red-light:#e74c3c;--green:#2ecc71;--text:#e8dcc8;--text-muted:#8a7a62;--text-dim:#5a4e3a}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Crimson Text',Georgia,serif;font-size:16px;min-height:100vh;background-image:radial-gradient(ellipse at 20% 0%,rgba(201,168,76,.06) 0%,transparent 60%),radial-gradient(ellipse at 80% 100%,rgba(192,57,43,.05) 0%,transparent 60%)}
header{border-bottom:1px solid var(--border);padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between;background:rgba(10,8,6,.8);backdrop-filter:blur(8px);position:sticky;top:0;z-index:100}
header h1{font-family:'Cinzel',serif;font-size:1.1rem;font-weight:600;color:var(--gold);letter-spacing:.08em}
header a{font-family:'Cinzel',serif;font-size:.75rem;color:var(--text-muted);text-decoration:none;border:1px solid var(--border);padding:.35rem .9rem;border-radius:4px;transition:all .2s}
header a:hover{color:var(--gold);border-color:var(--gold)}
.main{max-width:900px;margin:0 auto;padding:1.5rem 1rem 3rem}
.monster-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1.25rem}
.m-tab{padding:.4rem 1rem;font-family:'Cinzel',serif;font-size:.7rem;letter-spacing:.06em;border:1px solid var(--border);border-radius:3px;cursor:pointer;background:transparent;color:var(--text-muted);transition:all .2s}
.m-tab:hover{color:var(--gold);border-color:rgba(201,168,76,.4)}
.m-tab.active{background:rgba(201,168,76,.12);color:var(--gold);border-color:var(--gold)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:1.25rem 1.5rem;margin-bottom:1rem}
.card-title{font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:.12em;color:var(--text-dim);text-transform:uppercase;margin-bottom:.75rem}
.monster-name{font-family:'Cinzel',serif;font-size:1.4rem;font-weight:600;color:var(--gold-light);margin-bottom:.2rem}
.monster-meta{font-size:.9rem;color:var(--text-muted);font-style:italic;margin-bottom:.75rem}
.info-row{font-size:.95rem;color:var(--text-muted);margin-bottom:.4rem}
.info-row strong{color:var(--text);font-weight:600}
.cr-badge{display:inline-block;padding:.15rem .7rem;background:rgba(201,168,76,.12);border:1px solid rgba(201,168,76,.3);border-radius:20px;font-family:'Cinzel',serif;font-size:.7rem;color:var(--gold);margin-left:.75rem;vertical-align:middle}
.stat-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-bottom:1rem}
.stat-box{background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:.6rem .25rem;text-align:center}
.stat-label{font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.08em;color:var(--text-dim);margin-bottom:.2rem}
.stat-score{font-size:1.2rem;font-weight:600;color:var(--text)}
.stat-mod{font-size:.8rem;color:var(--gold)}
.hp-numbers{display:flex;align-items:baseline;gap:.5rem;margin-bottom:.5rem}
.hp-current{font-family:'Cinzel',serif;font-size:2rem;font-weight:700}
.hp-max{font-size:1rem;color:var(--text-muted)}
.hp-bar-track{height:10px;background:rgba(255,255,255,.06);border-radius:10px;overflow:hidden;margin-bottom:.75rem}
.hp-bar-fill{height:100%;border-radius:10px;transition:width .4s ease,background .4s ease}
.hp-controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.hp-input{width:80px;padding:.4rem .6rem;background:var(--surface2);border:1px solid var(--border);border-radius:4px;color:var(--text);font-family:'Crimson Text',serif;font-size:1rem;text-align:center}
.hp-input:focus{outline:none;border-color:var(--gold)}
.btn{padding:.4rem 1rem;font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:.08em;border-radius:4px;cursor:pointer;border:1px solid;transition:all .2s;background:transparent}
.btn-dmg{border-color:rgba(192,57,43,.5);color:#e07060}
.btn-dmg:hover{background:rgba(192,57,43,.15);border-color:var(--red-light)}
.btn-heal{border-color:rgba(46,204,113,.4);color:#5dde8a}
.btn-heal:hover{background:rgba(46,204,113,.1);border-color:var(--green)}
.btn-reset{border-color:var(--border);color:var(--text-muted)}
.btn-reset:hover{border-color:var(--text-muted);color:var(--text)}
.btn-primary{background:rgba(201,168,76,.12);border-color:var(--gold);color:var(--gold)}
.btn-primary:hover{background:rgba(201,168,76,.22)}
.atk-card{border:1px solid var(--border);border-radius:5px;padding:1rem;margin-bottom:.75rem;background:var(--surface2)}
.atk-name{font-family:'Cinzel',serif;font-size:.9rem;font-weight:600;color:var(--gold-light);margin-bottom:.25rem}
.atk-meta{font-size:.85rem;color:var(--text-muted);font-style:italic;margin-bottom:.75rem}
.roll-area{background:rgba(0,0,0,.2);border-radius:4px;padding:.75rem}
.roll-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:.5rem}
.roll-label{font-family:'Cinzel',serif;font-size:.62rem;letter-spacing:.06em;color:var(--text-dim);width:90px}
.roll-input{width:72px;padding:.35rem .5rem;background:var(--surface);border:1px solid var(--border);border-radius:4px;color:var(--text);font-family:'Crimson Text',serif;font-size:1rem;text-align:center}
.roll-input:focus{outline:none;border-color:var(--gold)}
.result{border-radius:4px;padding:.75rem 1rem;margin-top:.75rem;font-size:.95rem;line-height:1.6}
.result-hit{background:rgba(46,204,113,.08);border:1px solid rgba(46,204,113,.3);color:#7de8a0}
.result-miss{background:rgba(192,57,43,.08);border:1px solid rgba(192,57,43,.3);color:#e07070}
.result-crit{background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.4);color:var(--gold-light)}
.result-zone{background:rgba(100,120,220,.08);border:1px solid rgba(100,120,220,.3);color:#a0b0f0}
.calc-step{font-size:.85rem;opacity:.85;margin-top:.25rem;padding-left:.75rem;border-left:2px solid currentColor}
.trait{margin-bottom:.75rem;font-size:.95rem;line-height:1.65}
.trait-name{font-family:'Cinzel',serif;font-size:.8rem;color:var(--gold)}
.tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:.4rem}
.tag{padding:.15rem .65rem;border-radius:20px;font-size:.8rem;border:1px solid}
.tag-immune{background:rgba(46,204,113,.08);border-color:rgba(46,204,113,.3);color:#7de8a0}
.tag-resist{background:rgba(100,120,220,.08);border-color:rgba(100,120,220,.3);color:#a0b0f0}
.tag-info{background:rgba(180,140,60,.08);border-color:rgba(180,140,60,.3);color:var(--gold)}
.dm-note{font-style:italic;color:var(--text-muted);font-size:.93rem;line-height:1.7;border-left:2px solid var(--border);padding-left:.75rem}
.lore-box{background:rgba(201,168,76,.04);border:1px solid rgba(201,168,76,.15);border-radius:4px;padding:.75rem 1rem;margin-bottom:.75rem;font-size:.9rem;color:var(--text-muted);line-height:1.7;font-style:italic}
@media(max-width:500px){.stat-grid{grid-template-columns:repeat(3,1fr)}.roll-row{flex-direction:column;align-items:flex-start}}
</style>
</head>
<body>
<header>
  <h1>⚔ DM Tracker — Les Ruines Oubliées</h1>
  <a href="scene.html">→ Page des joueurs</a>
</header>
<div class="main">
  <div class="monster-tabs" id="tabs"></div>
  <div id="content"></div>
</div>
<script>
const monsters = [
  {
    id:"guerrier",
    name:"Squelette Guerrier Caelthari",
    type:"Gardien enchanté · Offensif (×2 dans la salle)",
    cr:"1/2", xp:100,
    ac:14, acNote:"armure ancienne fragmentée",
    maxHp:18, hpFormula:"4d8", speed:"9 m",
    stats:{FOR:14,DEX:10,CON:10,INT:6,SAG:8,CHA:5},
    saves:{}, skills:{},
    senses:"Vision dans le noir 18 m — Perception passive 9",
    langs:"—",
    lore:"Gardien enchanté par les Caelthari eux-mêmes pour protéger le Tribunal éternellement. Ne parle pas. Ne fuit pas. Défend jusqu'à la destruction.",
    traits:[
      {name:"Immunités",desc:"Poison, empoisonnement. Ne peut pas être charmé ou effrayé."},
      {name:"Runes de combat",desc:"Les runes gravées dans ses os amplifient ses frappes. La Frappe runique ne peut être utilisée qu'une seule fois par combat."}
    ],
    attacks:[
      {name:"Épée ancienne",type:"Mêlée",bonus:4,range:"1,5 m",dmgDice:"1d8",dmgBonus:2,dmgType:"tranchant",zone:false},
      {name:"Frappe runique",type:"Mêlée (1×/combat)",bonus:4,range:"1,5 m",dmgDice:"2d6",dmgBonus:2,dmgType:"force",zone:false}
    ],
    immunities:["poison","empoisonnement"],
    resistances:[],
    condImmunities:["charmé","effrayé"],
    note:"Avance droit vers la cible la plus proche. Protège les mages en priorité à partir du tour 2. Utilise la Frappe runique sur le personnage le plus tanky."
  },
  {
    id:"mage",
    name:"Squelette Mage Caelthari",
    type:"Gardien enchanté · Contrôle (×2 dans la salle)",
    cr:"1/2", xp:100,
    ac:12, acNote:"robes magiques",
    maxHp:13, hpFormula:"3d8", speed:"9 m",
    stats:{FOR:6,DEX:14,CON:10,INT:14,SAG:10,CHA:8},
    saves:{}, skills:{},
    senses:"Vision dans le noir 18 m — Perception passive 10",
    langs:"—",
    lore:"Crâne illuminé de l'intérieur d'une lumière bleue froide. Robes en lambeaux qui flottent sans raison apparente. Leurs mains projettent des éclairs de lumière concentrée.",
    traits:[
      {name:"Projectile magique",desc:"Touche automatiquement — pas de jet d'attaque requis. Cible le lanceur de sorts en priorité."},
      {name:"Entrave runique",desc:"Recharge 5-6. Le personnage ciblé doit réussir DEX DC 13 ou être entravé jusqu'à la fin de son prochain tour (vitesse 0, désavantage aux attaques)."}
    ],
    attacks:[
      {name:"Projectile magique",type:"Distance (auto)",bonus:0,range:"18 m",dmgDice:"2d4",dmgBonus:2,dmgType:"force",zone:false,auto:true},
      {name:"Entrave runique",type:"Zone · Recharge 5-6",bonus:0,range:"9 m",dmgDice:"0",dmgBonus:0,dmgType:"entrave",zone:true}
    ],
    immunities:["poison","empoisonnement"],
    resistances:[],
    condImmunities:["charmé","effrayé"],
    note:"Reste à distance maximale. Cible les lanceurs de sorts avec le Projectile. Utilise l'Entrave runique sur le personnage le plus dangereux ou celui qui avance vers les mages."
  },
  {
    id:"sael",
    name:"Sael, le Gardien Enchaîné",
    type:"Caelthari contaminé · Boss final",
    cr:"2", xp:450,
    ac:13, acNote:"forme instable et partiellement incorporelle",
    maxHp:45, hpFormula:"6d8+18", speed:"9 m (lié au cercle — max 9 m)",
    stats:{FOR:16,DEX:10,CON:16,INT:12,SAG:10,CHA:14},
    saves:{"Con":"+5","Sag":"+2"},
    skills:{},
    senses:"Vision dans le noir 18 m — Perception passive 10",
    langs:"Caelthari (ancien) · Commun archaïque",
    lore:"Ce n'était pas un monstre. C'était un Caelthari — transformé par un contact trop prolongé avec le dieu inachevé. Ses frères l'ont emprisonné ici parce qu'ils ne pouvaient pas le détruire. Il combat parce que le sceau le contraint. Même contre des gens qui n'ont rien fait de mal.",
    traits:[
      {name:"Forme instable",desc:"Les attaques magiques ont désavantage contre Sael — sa forme incorporelle partielle dévie l'énergie de façon imprévisible."},
      {name:"Lien au sceau",desc:"Sael ne peut pas s'éloigner à plus de 9 m du cercle de pierre central. Il est physiquement retenu par les chaînes spectrales."},
      {name:"Phase critique (≤ 22 PV)",desc:"Une chaîne se brise. Sael gagne avantage sur une attaque un tour sur deux. Des pierres tombent du plafond (DEX DC 12 ou 1d4 dégâts, une fois par tour)."}
    ],
    attacks:[
      {name:"Frappe corrompue",type:"Mêlée",bonus:4,range:"1,5 m",dmgDice:"1d8",dmgBonus:3,dmgType:"nécrotique",zone:false},
      {name:"Onde instable",type:"Zone · Recharge 5-6",bonus:0,range:"3 m autour",dmgDice:"2d6",dmgBonus:0,dmgType:"force",zone:true}
    ],
    immunities:["charme","peur","empoisonnement"],
    resistances:["contondant (non magique)","perforant (non magique)","tranchant (non magique)"],
    condImmunities:[],
    note:"Tour 1 : Frappe. Tour 2 : Frappe. Tour 3 : Onde si disponible. Alternance ensuite.\nTrop difficile → 1d6+2, Onde une seule fois, une chaîne retient Sael un tour.\nTrop facile → +5-10 PV, pierres tombent 2× par tour.\nSa mort : ne pas traiter comme une victoire ordinaire. Sa forme se dissout lentement. Quelque chose change dans ses yeux — du soulagement. Derniers mots : 'Ce que vous allez trouver... gardez-le loin de ce qui dort.'"
  }
];

let hpMap={};
monsters.forEach(m=>hpMap[m.id]=m.maxHp);
let current=monsters[0].id;

function mod(s){return Math.floor((s-10)/2)}
function modStr(s){const m=mod(s);return(m>=0?"+":"")+m}
function hpColor(p){if(p>.5)return"#2ecc71";if(p>.25)return"#e67e22";return"#c0392b"}

function renderTabs(){
  document.getElementById("tabs").innerHTML=monsters.map(m=>
    `<button class="m-tab${m.id===current?" active":""}" onclick="pick('${m.id}')">${m.name.split(",")[0].split(" ").slice(0,2).join(" ")}</button>`
  ).join("");
}
function pick(id){current=id;renderTabs();renderMonster()}

function renderMonster(){
  const m=monsters.find(x=>x.id===current);
  const hp=hpMap[m.id];
  const pct=Math.max(0,hp/m.maxHp);
  const statKeys=["FOR","DEX","CON","INT","SAG","CHA"];
  document.getElementById("content").innerHTML=`
<div class="card">
  <div class="monster-name">${m.name}<span class="cr-badge">CR ${m.cr} · ${m.xp} XP</span></div>
  <div class="monster-meta">${m.type}</div>
  <div class="info-row"><strong>CA</strong> ${m.ac}${m.acNote?" ("+m.acNote+")":""} &nbsp;·&nbsp; <strong>Vitesse</strong> ${m.speed}</div>
  <div class="info-row" style="font-size:.85rem;color:var(--text-dim)">${m.senses} &nbsp;·&nbsp; ${m.langs}</div>
</div>
<div class="lore-box">${m.lore}</div>
<div class="card">
  <div class="card-title">Points de vie — ${m.hpFormula}</div>
  <div class="hp-numbers">
    <span class="hp-current" id="hpNum" style="color:${hpColor(pct)}">${hp}</span>
    <span class="hp-max">/ ${m.maxHp} PV</span>
  </div>
  <div class="hp-bar-track"><div class="hp-bar-fill" id="hpBar" style="width:${Math.round(pct*100)}%;background:${hpColor(pct)}"></div></div>
  <div class="hp-controls">
    <input type="number" class="hp-input" id="hpVal" placeholder="pts" min="0">
    <button class="btn btn-dmg" onclick="applyHp(-1)">Dégât</button>
    <button class="btn btn-heal" onclick="applyHp(1)">Soin</button>
    <button class="btn btn-reset" onclick="resetHp()">Reset</button>
  </div>
</div>
<div class="card">
  <div class="card-title">Caractéristiques</div>
  <div class="stat-grid">
    ${statKeys.map(k=>`<div class="stat-box"><div class="stat-label">${k}</div><div class="stat-score">${m.stats[k]}</div><div class="stat-mod">${modStr(m.stats[k])}</div></div>`).join("")}
  </div>
  ${Object.keys(m.saves).length?`<div class="info-row" style="margin-top:.5rem"><strong>Jets de sauvegarde :</strong> ${Object.entries(m.saves).map(([k,v])=>k+" "+v).join(", ")}</div>`:""}
  ${m.immunities.length?`<div style="margin-top:.75rem"><div class="card-title" style="margin-bottom:.3rem">Immunités</div><div class="tags">${m.immunities.map(i=>`<span class="tag tag-immune">${i}</span>`).join("")}</div></div>`:""}
  ${m.resistances.length?`<div style="margin-top:.75rem"><div class="card-title" style="margin-bottom:.3rem">Résistances</div><div class="tags">${m.resistances.map(i=>`<span class="tag tag-resist">${i}</span>`).join("")}</div></div>`:""}
  ${m.condImmunities.length?`<div style="margin-top:.75rem"><div class="card-title" style="margin-bottom:.3rem">États immunisés</div><div class="tags">${m.condImmunities.map(i=>`<span class="tag tag-info">${i}</span>`).join("")}</div></div>`:""}
</div>
<div class="card">
  <div class="card-title">Traits & capacités</div>
  ${m.traits.map(t=>`<div class="trait"><span class="trait-name">${t.name}. </span>${t.desc}</div>`).join("")}
</div>
<div class="card">
  <div class="card-title">Attaques</div>
  ${m.attacks.map((atk,i)=>`
  <div class="atk-card">
    <div class="atk-name">${atk.name}</div>
    <div class="atk-meta">${atk.type} · Portée ${atk.range}${atk.bonus>0?" · Bonus +"+atk.bonus:""} · ${atk.dmgDice !== "0"?atk.dmgDice+(atk.dmgBonus?"+"+atk.dmgBonus:"")+" "+atk.dmgType:atk.dmgType}</div>
    <div class="roll-area">
      ${atk.zone?`
      <div class="roll-row">
        <span class="roll-label">Jet de dégâts</span>
        <input type="number" class="roll-input" id="dr${i}" min="1" placeholder="${atk.dmgDice}">
      </div>
      <button class="btn btn-primary" onclick="resolveZone(${i})" style="margin-top:.25rem">Résoudre →</button>`
      :atk.auto?`
      <div class="roll-row">
        <span class="roll-label">Jet de dégâts</span>
        <input type="number" class="roll-input" id="dr${i}" min="1" placeholder="${atk.dmgDice}">
      </div>
      <button class="btn btn-primary" onclick="resolveAuto(${i})" style="margin-top:.25rem">Résoudre →</button>`
      :`
      <div class="roll-row">
        <span class="roll-label">Jet d'attaque</span>
        <input type="number" class="roll-input" id="ar${i}" min="1" max="20" placeholder="d20">
        <span class="roll-label">CA cible</span>
        <input type="number" class="roll-input" id="ac${i}" min="1" max="30" placeholder="CA">
      </div>
      <div class="roll-row">
        <span class="roll-label">Jet de dégâts</span>
        <input type="number" class="roll-input" id="dr${i}" min="1" placeholder="${atk.dmgDice}">
      </div>
      <button class="btn btn-primary" onclick="resolve(${i})" style="margin-top:.25rem">Résoudre →</button>`}
      <div id="res${i}"></div>
    </div>
  </div>`).join("")}
</div>
<div class="card">
  <div class="card-title">Note du DM</div>
  <div class="dm-note" style="white-space:pre-line">${m.note}</div>
</div>`;
}

function applyHp(sign){
  const m=monsters.find(x=>x.id===current);
  const val=parseInt(document.getElementById("hpVal").value)||0;
  if(!val)return;
  hpMap[m.id]=Math.max(0,Math.min(m.maxHp,hpMap[m.id]+sign*val));
  document.getElementById("hpVal").value="";
  updateHpUI(m);
}
function resetHp(){const m=monsters.find(x=>x.id===current);hpMap[m.id]=m.maxHp;updateHpUI(m)}
function updateHpUI(m){
  const hp=hpMap[m.id];const pct=Math.max(0,hp/m.maxHp);
  document.getElementById("hpNum").textContent=hp;
  document.getElementById("hpNum").style.color=hpColor(pct);
  const bar=document.getElementById("hpBar");
  bar.style.width=Math.round(pct*100)+"%";bar.style.background=hpColor(pct);
}
function resolve(i){
  const m=monsters.find(x=>x.id===current);const atk=m.attacks[i];
  const ar=parseInt(document.getElementById("ar"+i)?.value);
  const ac=parseInt(document.getElementById("ac"+i)?.value);
  const dr=parseInt(document.getElementById("dr"+i)?.value);
  const out=document.getElementById("res"+i);
  if(!ar||!ac||!dr){out.innerHTML=`<div class="result result-miss">⚠ Remplis le jet d'attaque, la CA et les dégâts.</div>`;return}
  const total=ar+atk.bonus;
  const isCrit=ar===20,isFumble=ar===1,hits=isCrit||(total>=ac&&!isFumble);
  if(isFumble){out.innerHTML=`<div class="result result-miss"><strong>💨 Raté critique</strong><div class="calc-step">Jet : 1 — échec automatique.</div></div>`}
  else if(isCrit){const dmg=dr*2+atk.dmgBonus;out.innerHTML=`<div class="result result-crit"><strong>⚡ COUP CRITIQUE !</strong><div class="calc-step">Jet : 20 — succès automatique.</div><div class="calc-step">(${dr}×2) + ${atk.dmgBonus} = <strong>${dmg} dégâts ${atk.dmgType}</strong></div></div>`}
  else if(hits){const dmg=dr+atk.dmgBonus;out.innerHTML=`<div class="result result-hit"><strong>✓ Touche !</strong><div class="calc-step">${ar} + ${atk.bonus} = ${total} ≥ ${ac} (CA)</div><div class="calc-step">${dr} + ${atk.dmgBonus} = <strong>${dmg} dégâts ${atk.dmgType}</strong></div></div>`}
  else{out.innerHTML=`<div class="result result-miss"><strong>✗ Raté.</strong><div class="calc-step">${ar} + ${atk.bonus} = ${total} &lt; ${ac} (CA)</div></div>`}
}
function resolveAuto(i){
  const m=monsters.find(x=>x.id===current);const atk=m.attacks[i];
  const dr=parseInt(document.getElementById("dr"+i)?.value);
  const out=document.getElementById("res"+i);
  if(!dr){out.innerHTML=`<div class="result result-miss">⚠ Entre le jet de dégâts.</div>`;return}
  const dmg=dr+atk.dmgBonus;
  out.innerHTML=`<div class="result result-hit"><strong>🎯 Projectile magique — touche automatiquement</strong><div class="calc-step">${dr} + ${atk.dmgBonus} = <strong>${dmg} dégâts ${atk.dmgType}</strong></div></div>`;
}
function resolveZone(i){
  const m=monsters.find(x=>x.id===current);const atk=m.attacks[i];
  const dr=parseInt(document.getElementById("dr"+i)?.value);
  const out=document.getElementById("res"+i);
  if(!dr){out.innerHTML=`<div class="result result-miss">⚠ Entre le jet de dégâts.</div>`;return}
  const half=Math.floor(dr/2);
  out.innerHTML=`<div class="result result-zone"><strong>🌀 ${atk.name} — tous les personnages à ${atk.range}</strong><div class="calc-step">Jet de sauvegarde DEX DC 12 requis pour chaque personnage.</div><div class="calc-step">Échec : <strong>${dr} dégâts ${atk.dmgType}</strong></div><div class="calc-step">Réussite : <strong>${half} dégâts ${atk.dmgType}</strong> (moitié)</div></div>`;
}
renderTabs();renderMonster();
</script>
</body>
</html>
